name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy ERP
        run: |
          curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --fail-with-body

      - name: Deploy WhatsApp Service
        run: |
          curl -s -X GET "https://coolify.boletoapi.com/api/v1/deploy?uuid=zskog8c8gkw0sk4s04gs4goc&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --fail-with-body

      - name: Wait for containers
        run: sleep 120

      - name: Fix network aliases
        run: |
          # ERP alias
          for c in $(docker ps --format '{{.Names}}' | grep ygs0kks0sw8w048wcgw8wos0 | head -1); do
            docker network disconnect coolify "$c" 2>/dev/null || true
            docker network connect --alias mendeserp coolify "$c"
            echo "mendeserp → $c"
          done
          # WhatsApp alias
          for c in $(docker ps --format '{{.Names}}' | grep zskog8c8gkw0sk4s04gs4goc | head -1); do
            docker network disconnect coolify "$c" 2>/dev/null || true
            docker network connect --alias whatsapp-service coolify "$c"
            echo "whatsapp-service → $c"
          done

      - name: Update Traefik config
        run: |
          ERP_CONTAINER=$(docker ps --format '{{.Names}}' | grep ygs0kks0sw8w048wcgw8wos0 | head -1)
          python3 -c "
          content = '''http:
            routers:
              http-0-ygs0kks0sw8w048wcgw8wos0-manual:
                entryPoints:
                  - http
                middlewares:
                  - redirect-to-https
                rule: Host(\x60boletoapi.com\x60)
                service: http-0-ygs0kks0sw8w048wcgw8wos0-manual
                priority: 999
              https-0-ygs0kks0sw8w048wcgw8wos0-manual:
                entryPoints:
                  - https
                middlewares:
                  - gzip
                rule: Host(\x60boletoapi.com\x60)
                service: https-0-ygs0kks0sw8w048wcgw8wos0-manual
                priority: 999
                tls:
                  certResolver: letsencrypt
            services:
              http-0-ygs0kks0sw8w048wcgw8wos0-manual:
                loadBalancer:
                  servers:
                    - url: http://mendeserp:3000
              https-0-ygs0kks0sw8w048wcgw8wos0-manual:
                loadBalancer:
                  servers:
                    - url: http://mendeserp:3000
            middlewares:
              redirect-to-https:
                redirectScheme:
                  scheme: https
                  permanent: true
              gzip:
                compress: true
          '''
          with open('/data/coolify/proxy/dynamic/mendeserp.yaml', 'w') as f:
              f.write(content)
          print('Traefik config updated')
          "

      - name: Verify
        run: |
          sleep 5
          docker exec coolify-proxy ping -c1 -W2 mendeserp > /dev/null && echo "✅ mendeserp reachable"
          docker exec coolify-proxy ping -c1 -W2 whatsapp-service > /dev/null && echo "✅ whatsapp-service reachable"
          curl -s -o /dev/null -w "ERP: %{http_code}\n" --max-time 10 https://boletoapi.com/login
