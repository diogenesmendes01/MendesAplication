name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Trigger Coolify Deploy
    runs-on: ubuntu-latest
    needs: [] # roda após CI passar (configurar como required check no branch protection)

    steps:
      - name: Trigger deploy
        run: |
          curl -s -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --fail-with-body
        # COOLIFY_WEBHOOK_URL e COOLIFY_TOKEN devem ser configurados
        # em Settings > Secrets no GitHub do repo
