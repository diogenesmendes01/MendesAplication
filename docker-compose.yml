version: "3.8"

services:
  whatsapp-service:
    build: ./whatsapp-service
    container_name: whatsapp-service
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/mendeserp?schema=public
      - WHATSAPP_SERVICE_PORT=3001
      - WHATSAPP_SERVICE_API_KEY=${WHATSAPP_SERVICE_API_KEY:-your-api-key-here}
      - WHATSAPP_WEBHOOK_URL=http://host.docker.internal:3000/api/webhooks/whatsapp
      - WHATSAPP_WEBHOOK_SECRET=${WHATSAPP_WEBHOOK_SECRET:-your-webhook-secret-here}
    volumes:
      - whatsapp_uploads:/app/uploads
    restart: unless-stopped

volumes:
  whatsapp_uploads:
